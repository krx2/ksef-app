spring:
  application:
    name: ksef-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ksef_db}
    username: ${DB_USER:ksef_user}
    password: ${DB_PASS}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:ksef_user}
    password: ${RABBITMQ_PASS}

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          # Port 465 → MAIL_SSL=true,  MAIL_STARTTLS=false  (SMTP over SSL)
          # Port 587 → MAIL_SSL=false, MAIL_STARTTLS=true   (STARTTLS)
          ssl:
            enable: ${MAIL_SSL:false}
          starttls:
            enable: ${MAIL_STARTTLS:true}

server:
  port: 8080

ksef:
  api:
    # URL nadpisywany przez profil ksef-test lub ksef-prod (SPRING_PROFILES_ACTIVE w .env)
    # Fallback na testowe wyłącznie jako zabezpieczenie — w praktyce profil musi być ustawiony
    base-url: ${KSEF_BASE_URL:https://api-test.ksef.mf.gov.pl/v2}
    timeout-seconds: 30
    rate-limit:
      requests-per-second: 100
      requests-per-minute: 300
      requests-per-hour: 1200
  testdata-endpoints-available: true

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

app:
  mail:
    enabled: ${MAIL_ENABLED:false}
    from: ${MAIL_FROM:noreply@ksef-faktury.pl}
  ksef:
    # URL podglądu nadpisywany przez profil — fallback na testowe (KSeF v2)
    viewer-url: ${KSEF_VIEWER_URL:https://qr-test.ksef.mf.gov.pl/invoice}
    environment: test

logging:
  level:
    pl.ksef: INFO
    org.springframework.amqp: INFO
