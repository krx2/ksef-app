spring:
  application:
    name: ksef-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/ksef_db
    username: ksef_user
    password: ksef_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  rabbitmq:
    host: localhost
    port: 5672
    username: ksef_user
    password: ksef_pass

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 8080

ksef:
  api:
    base-url: https://api-test.ksef.mf.gov.pl/v2
    timeout-seconds: 30

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

app:
  mail:
    enabled: ${MAIL_ENABLED:false}
    from: ${MAIL_FROM:noreply@ksef-faktury.pl}
  ksef:
    viewer-url: ${KSEF_VIEWER_URL:https://ksef-test.mf.gov.pl/web/wizualizacja/FA}

logging:
  level:
    pl.ksef: DEBUG
    org.springframework.amqp: INFO
