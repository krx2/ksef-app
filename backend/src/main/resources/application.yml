spring:
  application:
    name: ksef-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/ksef_db
    username: ksef_user
    password: ksef_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  rabbitmq:
    host: localhost
    port: 5672
    username: ksef_user
    password: ksef_pass

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080

ksef:
  api:
    base-url: https://api-test.ksef.mf.gov.pl
    timeout-seconds: 30

logging:
  level:
    pl.ksef: DEBUG
    org.springframework.amqp: INFO
