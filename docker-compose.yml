version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ksef-postgres
    environment:
      POSTGRES_DB: ksef_db
      POSTGRES_USER: ksef_user
      POSTGRES_PASSWORD: ksef_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ksef_user -d ksef_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: ksef-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ksef_user
      RABBITMQ_DEFAULT_PASS: ksef_pass
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  rabbitmq_data:
